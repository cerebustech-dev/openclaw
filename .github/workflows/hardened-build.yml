name: Hardened Build

on:
  push:
    branches: [security/audit-remediation]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
      - "skills/**"
  workflow_dispatch:

concurrency:
  group: hardened-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cerebustech-dev/openclaw

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hardened
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hardened-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/cerebustech-dev/openclaw
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          push: false

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hardened
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image (only if scan passes)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hardened
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hardened-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/cerebustech-dev/openclaw
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
